name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Transpile
        run: npm run transpile || true

      - name: Test
        run: npm run test:all || true

      - name: Verify built file
        run: |
          echo "✅ Build complete"
          wc -l src/PapanGerak.pine
